name: Run tests and test coverage
on:
  push:
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '11'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Run tests
        run: ./gradlew --no-daemon jacocoTestCoverageVerification
      
      - name: Summarize tests results
        uses: jeantessier/code-coverage-summary-action@v1
        with:
          filenames: |
            solver/build/reports/jacoco/test/jacocoTestReport.xml
            generator/build/reports/jacoco/test/jacocoTestReport.xml
            test-shared/build/reports/jacoco/test/jacocoTestReport.xml
